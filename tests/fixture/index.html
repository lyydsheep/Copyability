<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Copy Restriction fixture</title>
  </head>
  <body>
    <main>
      <div
        id="supported-selection"
        class="block docx-text-block"
        data-block-type="text"
      >
        <div class="text-editor" contenteditable="false">
          <div class="ace-line">A complete paragraph for an authorized viewer.</div>
        </div>
      </div>
    </main>
    <p id="host-denial" role="alert" hidden>Copying is not allowed.</p>
    <script>
      document.addEventListener(
        "keydown",
        (event) => {
          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
            document.querySelector("#host-denial").hidden = false;
          }
        },
      );
    </script>
  </body>
</html>
